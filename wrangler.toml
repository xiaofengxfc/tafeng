name = "tafeng"
main = "worker/index.ts"
compatibility_date = "2026-06-18"
compatibility_flags = ["nodejs_compat"]

[define]
__dirname = '""'
__filename = '""'

# Treat .node native addon files as data blobs so esbuild doesn't choke.
# ssh2 wraps the require in try/catch so it falls back to pure JS crypto.
[[rules]]
type = "Data"
globs = ["**/*.node"]
fallthrough = true

[assets]
directory = "./dist/client"
binding = "ASSETS"

[[kv_namespaces]]
binding = "TAFENG_KV"
id = "4ad08647c20e4f36bb573c2f246de233"

[[r2_buckets]]
binding = "TAFENG_FILES"
bucket_name = "tafeng-files"